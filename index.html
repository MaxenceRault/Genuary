<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENUARY 2025 ~ debug.exe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/rivescript@latest/dist/rivescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

    <!-- LOADER -->
    <div class="loader" id="loader">
        <div class="loader-inner">
            <div class="loader-face">
                <div class="face-eyes">
                    <div class="face-eye"></div>
                    <div class="face-eye"></div>
                </div>
                <div class="face-mouth"></div>
            </div>
            <div class="loader-title">GENUARY</div>
            <div class="loader-bar-wrap">
                <div class="loader-bar" id="loader-bar"></div>
            </div>
            <div class="loader-percent" id="loader-percent">0%</div>
            <div class="loader-msg" id="loader-msg">initialisation...</div>
        </div>
    </div>

    <!-- CUSTOM CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- SVG DEFS -->
    <svg class="svg-defs" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>

    <!-- BACKGROUND -->
    <div class="bg-layers" aria-hidden="true">
        <div class="bg-paper"></div>
        <div class="bg-dots"></div>
        <div class="bg-halftone"></div>
    </div>

    <!-- FLOATING 3D OBJECTS -->
    <div class="decor-3d" aria-hidden="true" id="decor3d">
        <div class="float-obj obj-1"><div class="cube"><div class="face front"></div><div class="face back"></div><div class="face left"></div><div class="face right"></div><div class="face top"></div><div class="face bottom"></div></div></div>
        <div class="float-obj obj-2"><div class="donut"></div></div>
        <div class="float-obj obj-3"><div class="sphere"></div></div>
        <div class="float-obj obj-4"><div class="star-3d">&#9733;</div></div>
        <div class="float-obj obj-5"><div class="cube cube-sm"><div class="face front"></div><div class="face back"></div><div class="face left"></div><div class="face right"></div><div class="face top"></div><div class="face bottom"></div></div></div>
        <div class="float-obj obj-6"><div class="donut donut-sm"></div></div>
        <div class="float-obj obj-7"><div class="sphere sphere-sm"></div></div>
        <div class="float-obj obj-8"><div class="cross-3d"></div></div>
    </div>

    <!-- HERO -->
    <section class="hero" id="hero">
        <div class="hero-bg-text" aria-hidden="true">GENUARY</div>
        <div class="hero-content">
            <div class="hero-badge">v2025.01 &nbsp;~&nbsp; debug.exe</div>
            <h1 class="hero-title">
                <div class="title-line-wrap"><span class="title-line" data-scramble data-magnetic>GEN</span></div>
                <div class="title-line-wrap"><span class="title-line accent" data-scramble data-magnetic>UARY</span></div>
                <div class="title-line-wrap"><span class="title-line small">2025</span></div>
            </h1>
            <p class="hero-sub">
                <span>31_sketches</span>
                <span class="wiggle">/</span>
                <span>code_créatif</span>
                <span class="wiggle">/</span>
                <span>art_génératif</span>
            </p>
            <div class="hero-scroll-cta">
                <span>scroll pour explorer</span>
                <div class="bounce-arrow">&#8595;</div>
            </div>
        </div>
    </section>

    <!-- SKETCHES GRID -->
    <section class="collage" id="collage">
        <!-- Built by JS -->
    </section>

    <!-- FOOTER -->
    <footer class="goofy-footer">
        <div class="footer-bubble">
            <div>genuary 2025</div>
            <div class="footer-doodle">// end of file //</div>
        </div>
    </footer>

    <!-- CHATBOT -->
    <div class="chatbot" id="chatbot">
        <div class="chatbot-header" onclick="toggleChat()">
            <span>GRID_RECURSIVE.exe</span>
            <span id="toggle-icon">&#8212;</span>
        </div>
        <div class="chatbot-content">
            <div id="chat-messages">
                <p class="bot-message">sys.boot() &gt; prêt. tape un numéro [1-31] ou "mon favori"</p>
            </div>
            <div class="chat-input">
                <input type="text" id="user-input" placeholder="commande..." autocomplete="off">
                <button onclick="sendMessage()" data-magnetic>run</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
